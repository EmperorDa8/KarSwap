<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@200;300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#382f22",
              "primary-fixed-dim": "#d3c4b2",
              "background": "#131313",
              "surface-variant": "#353534",
              "surface-container": "#201f1f",
              "outline": "#998f85",
              "on-tertiary-fixed": "#231a0e",
              "inverse-primary": "#685d4e",
              "surface-dim": "#131313",
              "surface-container-lowest": "#0e0e0e",
              "on-surface": "#e5e2e1",
              "on-error": "#690005",
              "secondary": "#c8c6c5",
              "surface-bright": "#393939",
              "on-tertiary": "#392f21",
              "error-container": "#93000a",
              "error": "#ffb4ab",
              "on-surface-variant": "#d0c4ba",
              "on-background": "#e5e2e1",
              "tertiary-fixed": "#f1e0cc",
              "on-error-container": "#ffdad6",
              "secondary-fixed": "#e4e2e1",
              "on-secondary-fixed-variant": "#474746",
              "secondary-fixed-dim": "#c8c6c5",
              "tertiary-fixed-dim": "#d5c4b1",
              "tertiary-container": "#9d8e7d",
              "surface-container-high": "#2a2a2a",
              "on-tertiary-container": "#32281b",
              "inverse-on-surface": "#313030",
              "primary-container": "#9c8f7e",
              "secondary-container": "#474746",
              "on-primary-container": "#31281c",
              "on-secondary-container": "#b6b5b4",
              "surface": "#131313",
              "surface-tint": "#d3c4b2",
              "primary": "#d3c4b2",
              "on-primary-fixed-variant": "#4f4538",
              "inverse-surface": "#e5e2e1",
              "outline-variant": "#4d453d",
              "on-tertiary-fixed-variant": "#504536",
              "on-primary-fixed": "#221a0f",
              "surface-container-low": "#1c1b1b",
              "tertiary": "#d5c4b1",
              "primary-fixed": "#f0e0cd",
              "on-secondary": "#303030",
              "surface-container-highest": "#353534",
              "on-secondary-fixed": "#1b1c1c"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background-color: rgba(28, 27, 27, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        input:focus + .focus-border {
            width: 100%;
            background-color: #d3c4b2;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#1c1b1b]/60 backdrop-blur-xl border-b border-[#4d453d]/15 shadow-[0_0_48px_0_rgba(229,226,225,0.06)] flex items-center justify-between px-6 h-16">
<div class="flex items-center">
<span class="material-symbols-outlined text-[#d3c4b2] active:scale-95 duration-200 cursor-pointer" data-icon="menu">menu</span>
</div>
<h1 class="font-['Space_Grotesk'] uppercase tracking-[0.2em] font-bold text-xl text-[#d3c4b2]">KARSWAP</h1>
<div class="flex items-center">
<span class="material-symbols-outlined text-[#d3c4b2] active:scale-95 duration-200 cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="pt-16 pb-32 min-h-screen flex flex-col">
<!-- Top Section: Image Upload Area -->
<section class="p-6 md:p-12 flex flex-col items-center">
<div class="w-full max-w-4xl aspect-[16/10] md:aspect-[21/9] relative group cursor-pointer overflow-hidden rounded-lg bg-surface-container-low">
<!-- Background visual -->
<div class="absolute inset-0 opacity-20 grayscale group-hover:opacity-30 transition-opacity duration-700 bg-cover bg-center" data-alt="dramatic wide shot of a luxury sports car silhouette in a dark studio with moody blue and orange rim lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAadDZk-O5IhHi3z1wziyzc7Rbk0wvn50j7LmyK5UW_G0M3cvSJNtDJz8sJSngXpkRFwbrbWAWrHxhp8vnWdGIoFKkP03Xvzd0QvALzjh48uoZkD3uS7c-ZAaFiJoNkbe_mF1ASBSKh3PhBLLqX579Ym9n_doe_56Wq09BbUMGS78vJq_4gYVaAMEsFZzv0btuP2KbuFhpi3xubn6pu22UZu5GQgK1zRrnlwVh6KtGinRSCTvYalZvVclr14GmqGvEzbH0mShOv2pOW')"></div>
<!-- Upload Box -->
<div class="absolute inset-0 border-2 border-dashed border-[#4d453d]/15 flex flex-col items-center justify-center m-4 rounded-lg">
<span class="material-symbols-outlined text-primary mb-4 text-4xl" data-icon="cloud_upload">cloud_upload</span>
<h2 class="font-headline font-bold text-lg tracking-widest text-primary uppercase text-center px-4">UPLOAD VEHICLE IMAGES</h2>
<p class="font-body text-xs text-on-surface-variant/60 mt-2 tracking-tighter uppercase">Front, Side, Interior, and Odometer</p>
</div>
</div>
</section>
<!-- Separation using background shift -->
<section class="flex-grow bg-surface-container-low rounded-t-xl mt-4 px-6 py-12 md:px-12">
<div class="max-w-4xl mx-auto">
<header class="mb-12">
<h3 class="font-headline text-3xl font-bold tracking-tight text-on-surface uppercase mb-2">VEHICLE DETAILS</h3>
<p class="font-body text-on-surface-variant text-sm">Provide accurate data for a precise obsidian-grade valuation.</p>
</header>
<!-- Premium Form -->
<form class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
<!-- Make -->
<div class="relative group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-primary/70 mb-1">Make</label>
<input class="w-full bg-transparent border-0 border-b border-[#4d453d]/30 py-3 px-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-body text-lg transition-all focus:border-primary" placeholder="e.g. Porsche" type="text"/>
</div>
<!-- Model -->
<div class="relative group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-primary/70 mb-1">Model</label>
<input class="w-full bg-transparent border-0 border-b border-[#4d453d]/30 py-3 px-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-body text-lg transition-all focus:border-primary" placeholder="e.g. 911 GT3 RS" type="text"/>
</div>
<!-- Year -->
<div class="relative group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-primary/70 mb-1">Year</label>
<input class="w-full bg-transparent border-0 border-b border-[#4d453d]/30 py-3 px-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-body text-lg transition-all focus:border-primary" placeholder="2024" type="number"/>
</div>
<!-- Mileage -->
<div class="relative group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-primary/70 mb-1">Mileage (KM)</label>
<input class="w-full bg-transparent border-0 border-b border-[#4d453d]/30 py-3 px-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-body text-lg transition-all focus:border-primary" placeholder="500" type="number"/>
</div>
<!-- Condition -->
<div class="md:col-span-2 relative group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-primary/70 mb-4">Condition</label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-2 rounded-sm bg-secondary-container text-on-secondary-container text-xs font-bold tracking-widest uppercase hover:bg-primary hover:text-on-primary transition-all" type="button">Pristine</button>
<button class="px-6 py-2 rounded-sm bg-surface-container-high text-on-surface-variant text-xs font-bold tracking-widest uppercase hover:bg-primary hover:text-on-primary transition-all" type="button">Excellent</button>
<button class="px-6 py-2 rounded-sm bg-surface-container-high text-on-surface-variant text-xs font-bold tracking-widest uppercase hover:bg-primary hover:text-on-primary transition-all" type="button">Good</button>
<button class="px-6 py-2 rounded-sm bg-surface-container-high text-on-surface-variant text-xs font-bold tracking-widest uppercase hover:bg-primary hover:text-on-primary transition-all" type="button">Fair</button>
</div>
</div>
<!-- Call to Action -->
<div class="md:col-span-2 mt-12 flex justify-center">
<button class="w-full md:w-auto md:min-w-[320px] px-12 py-5 rounded-full glass-panel border border-primary/20 text-primary font-headline font-bold text-sm tracking-[0.2em] uppercase hover:bg-primary hover:text-on-primary transition-all active:scale-95 shadow-[0_8px_32px_rgba(0,0,0,0.3)]" type="submit">
                            GET ESTIMATED VALUE
                        </button>
</div>
</form>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-[2rem] z-50 bg-[#1c1b1b]/60 backdrop-blur-xl border-t border-[#4d453d]/15 shadow-[0_-8px_32px_rgba(0,0,0,0.4)] flex justify-around items-center h-20 px-4 pb-safe">
<!-- EXPLORE -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 hover:text-[#d3c4b2] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">EXPLORE</span>
</a>
<!-- SWAP -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 hover:text-[#d3c4b2] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="swap_horiz">swap_horiz</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">SWAP</span>
</a>
<!-- ESTIMATE (ACTIVE) -->
<a class="flex flex-col items-center justify-center text-[#d3c4b2] bg-[#d3c4b2]/10 rounded-full px-4 py-1 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">ESTIMATE</span>
</a>
<!-- GARAGE -->
<a class="flex flex-col items-center justify-center text-[#e5e2e1]/40 hover:text-[#d3c4b2] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="directions_car">directions_car</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-medium">GARAGE</span>
</a>
</nav>
</body></html>
